<html>

<head>
	<title>Lightweight Charts test</title>
</head>

<body>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0" />
	<!-- MDB -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/2.9.4/mdb.min.css" rel="stylesheet"/>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
	<link rel="stylesheet" href="static/style.css">

	<div id="titlediv">
		 <h1><img src="{{url_for('static', filename='img/btc.png')}}" alt="alternatetext" style="width:64px;height:64px; margin-right: 10px; margin-top: 5px; margin-left: 5px;">{{title}}</h1>
		
	</div>
	
	

	<div id="properties" style="margin-left: 4%; left: 15%; width: 59%;" class="settings">
		<form action="/" method="GET">

			<label style="margin-right: 10px;"></label>
			<select id="pair_symbol_option_id" name = "pair_symbol_option_name" class="settings" style="width: 95px;">
				{% for symbol in symbols %}
					<option value="{{symbol['symbol']}}">{{symbol['symbol']}}</option>
				{% endfor %}
			</select>
	
			<label style="margin-right: 10px;"></label>
			<select id="interval_option_id" name = "interval_option_name" class="settings">
					<option value="1m">1m</option>
					<option value="3m">3m</option>
					<option value="5m">5m</option>
					<option value="15m">15m</option>
					<option value="30m">30m</option>
					<option value="1h">1h</option>
					<option value="2h">2h</option>
					<option value="4h">4h</option>
					<option value="6h">6h</option>
					<option value="8h">8h</option>
					<option value ="12h">12h</option>
					<option value="1d">1d</option>
					<option value="3d">3d</option>
					<option value="1w">1w</option>
					<option value="1M">1M</option>
			</select>
	
			<label style="margin-right: 10px;"></label>
			<select id="data_amount_option_id" name = "data_amount_option_name" class="settings">
				<option value="1 day ago UTC" selected>1D</option>
				<option value="7 days ago UTC">1W</option>
				<option value="1 month ago UTC">1M</option>
				<option value="2 months ago UTC">2M</option>
				<option value="3 months ago UTC">3M</option>
			</select>
			<button type="button" id="display_data_bn" class="settings">Display data</button>
			<!--<button type="button" id="insert_curve_bn">Insert curve</button>-->
			<select id="priceScaleModeSelect" class="settings" style="width: 60px;">
				<option value="normal" selected>Def</option>
				<option value="logarithmic">Logaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa</option>
				<option value="percentage">%</option>
			</select>
			<button type="button" id="set_pricescalemode_bn" class="settings">Change scale</button>
			
		</form>


	</div>

	<div id="container" class="mainchart"></div>
	<canvas id="myChart" class="subchart"></canvas>

	<div id="infodiv1">
		<table id="infotable" class="table table-dark">
			<thead>
				<tr>
					<th scope="col">#</th>
					<th scope="col">pair</th>
					<th scope="col">base</th>
					<th scope="col">quote</th>
					<th scope="col">interest</th>
				</tr>
			</thead>
		</table>
	</div>
	<div id="infodiv2"></div>


	<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3" crossorigin="anonymous"></script>
	<!-- MDB -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
	<script src="{{url_for('static', filename='chart.js')}}"></script>

	
</body>

</html>
